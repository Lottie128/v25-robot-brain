<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>V25 Face</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="face-container">
    <!-- Left Eye -->
    <div class="eye left">
      <svg viewBox="0 0 100 100" class="eye-svg">
        <!-- Socket Glow -->
        <circle cx="50" cy="50" r="48" class="socket-glow" />
        <!-- Main Socket -->
        <circle cx="50" cy="50" r="45" class="socket" />
        
        <!-- Iris & Pupil Group -->
        <g class="iris-group">
          <circle cx="50" cy="50" r="22" class="iris" />
          <circle cx="50" cy="50" r="18" class="iris-detail" />
          <circle cx="50" cy="50" r="10" class="pupil" />
          <!-- Glints -->
          <circle cx="44" cy="42" r="4" class="glint main" />
          <circle cx="56" cy="58" r="2" class="glint sub" />
        </g>

        <!-- Eyelids -->
        <rect x="0" y="0" width="100" height="0" class="lid-top" />
        <rect x="0" y="100" width="100" height="0" class="lid-bottom" />
      </svg>
    </div>

    <!-- Right Eye -->
    <div class="eye right">
      <svg viewBox="0 0 100 100" class="eye-svg">
        <circle cx="50" cy="50" r="48" class="socket-glow" />
        <circle cx="50" cy="50" r="45" class="socket" />
        
        <g class="iris-group">
          <circle cx="50" cy="50" r="22" class="iris" />
          <circle cx="50" cy="50" r="18" class="iris-detail" />
          <circle cx="50" cy="50" r="10" class="pupil" />
          <circle cx="44" cy="42" r="4" class="glint main" />
          <circle cx="56" cy="58" r="2" class="glint sub" />
        </g>

        <rect x="0" y="0" width="100" height="0" class="lid-top" />
        <rect x="0" y="100" width="100" height="0" class="lid-bottom" />
      </svg>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
